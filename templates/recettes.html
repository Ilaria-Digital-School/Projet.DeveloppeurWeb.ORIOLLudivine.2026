<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toutes les recettes - Pâtissons</title>
    <meta name="description"
        content="Pâtissons, le site collaboratif de recettes de pâtisseries. Partagez et découvrez les meilleures recettes !">

    <!-- Polices Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,200;1,300&display=swap"
        rel="stylesheet">
    
    <!-- Lien vers le fichier CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <!-- Lien vers le fichier CSS du Chatbot -->
    <link rel="stylesheet" href="../assets/css/chatbot.css">
</head>

<body>
    <header class="header" role="banner">
        <a href="../index.html" aria-label="Retour à l'accueil">
            <img class="logo" src="../assets/images/patissons-logo.svg" alt="Logo Pâtissons">
        </a>
        <nav class="header-nav" aria-label="navigation principale">
            <a href="../index.html" aria-label="Revenir sur la page d'accueil">Accueil</a>
            <a href="recettes.html" aria-current="page">Recettes</a>
            <a href="ajouter_recette.html" aria-label="Ajouter une nouvelle recette">Ajouter une recette</a>
            <a href="connexion.html" aria-label="Se connecter ou s'inscrire">Connexion</a>
        </nav>

    </header>

    <main>
    
        <!-- Fil d'Ariane -->
        <nav aria-label="Fil d'ariane">
            <ol>
                <li><a href="../index.html">Accueil</a></li>
                <li aria-current="page">Recettes</li>
            </ol>
        </nav>
    
        <div class="recettes-layout">
            <aside class="filtres" aria-label="Filtres de recherche">
        
                <div class="filtre-groupe">
                    <label for="recherche-principale">Rechercher une recette</label>
                    <input type="search" id="recherche-principale" name="recherche" placeholder="Rechercher une recette...">
                </div>
        
                <div class="filtre-groupe">
                    <label for="categorie">Catégorie</label>
                    <select name="categorie" id="categorie">
                        <option value="">Toutes les catégories</option>
                        <option value="cremes-curds-ganache">Crèmes, curds et ganache</option>
                        <option value="pates-biscuits">Pâtes et biscuits</option>
                        <option value="tartes-millefeuilles">Tartes et millefeuilles</option>
                        <option value="entremets-gateaux-montes">Entremets et gâteaux montés</option>
                        <option value="patisseries-individuelles">Pâtisseries individuelles</option>
                        <option value="autres-gourmandises">Autres gourmandises</option>
                    </select>
                </div>
        
                <fieldset>
                    <legend>Temps de préparation</legend>
                    <label class="radio-ligne">
                        <input type="radio" name="temps" value="moins30">
                        Moins de 30 min
                    </label>
                    <label class="radio-ligne">
                        <input type="radio" name="temps" value="moins1h">
                        Moins d'1h
                    </label>
                    <label class="radio-ligne">
                        <input type="radio" name="temps" value="plus1h">
                        Plus d'1h
                    </label>
                </fieldset>
        
                <fieldset>
                    <legend>Difficulté</legend>
                    <label class="radio-ligne">
                        <input type="radio" name="difficulte" value="facile">
                        Facile
                    </label>
                    <label class="radio-ligne">
                        <input type="radio" name="difficulte" value="moyen">
                        Moyen
                    </label>
                    <label class="radio-ligne">
                        <input type="radio" name="difficulte" value="difficile">
                        Difficile
                    </label>
                </fieldset>
        
                <div class="filtre-groupe">
                    <label for="recherche-ingredient">Filtrer par ingrédient</label>
                    <input type="search" id="recherche-ingredient" name="ingredient"
                        placeholder="Ex : fraises, citron, chocolat…" autocomplete="off">
                </div>
                <button id="btn-reset" type="button" class="btn-reset">
                    Réinitialiser les filtres
                </button>
            </aside>
    
            <section class="resultats" aria-label="Résultats des recettes">
                <h1>Résultats de la recherche</h1>
                <div class="container_resultats" id="grille-recettes">
                    <!-- Les cartes seront générées par le JS -->
                </div>
            </section>
        </div>
    
    </main>

    <footer class="footer" role="contentinfo">
        <p>&copy; 2026 Pâtissons. Tous droits réservés.</p>
        <nav class="footer-nav" aria-label="Navigation secondaire">
            <a href="mentions-legales.html">Mentions légales</a>
            <a href="contact.html">Contact</a>
            <a href="accessibilite.html">Accessibilité</a>
        </nav>
    </footer>
       
    <!-- Lien vers le fichier JavaScript du Chatbot -->
    <script src="../assets/js/chatbot.js"></script>
    <!-- Lien vers le fichier JavaScript de la page recettes -->
    <script src="../assets/js/recettes.js"></script>
    </body>
</html>
