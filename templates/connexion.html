<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion - Pâtissons</title>
    <meta
      name="description"
      content="Connecter vous pour partager et découvrir les meilleures recettes !"
    />

    <!-- Polices Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,200;1,300&display=swap"
      rel="stylesheet"
    />

    <!-- Lien vers le fichier CSS -->
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>

  <body>
    <header class="header" role="banner">
      <a href="../index.html">
        <img
          class="logo"
          src="../assets/images/patissons-logo.svg"
          alt="Logo Pâtissons"
        />
      </a>
      <button
        class="burger"
        id="burger"
        aria-label="Ouvrir le menu"
        aria-expanded="false"
        aria-controls="header-nav"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav
        class="header-nav"
        id="header-nav"
        aria-label="navigation principale"
      >
        <a href="recettes.html" aria-label="Voir toutes les recettes"
          >Recettes</a
        >
        <a href="ajouter_recette.html" aria-label="Ajouter une nouvelle recette"
          >Ajouter une recette</a
        >
        <a
          href="connexion.html"
          aria-current="page"
          aria-label="Se connecter ou s'inscrire"
          >Connexion</a
        >
        <a href="favoris.html" aria-label="Voir les recettes favorites"
          >Favoris</a
        >
      </nav>
    </header>
    <main>
      <!-- Fil d'Ariane -->
      <nav aria-label="Fil d'ariane">
        <ol>
          <li>
            <a href="../index.html" aria-label="Retour à la page d'acceuil"
              >Accueil</a
            >
          </li>
          <li aria-current="page" aria-label="Page de connexion">Connexion</li>
        </ol>
      </nav>

      <section class="connexion-section" aria-label="Formulaire de connexion">
        <h1>Connexion à votre compte</h1>
        <form class="connexion-form" action="#" method="post" novalidate>
          <div class="form-group">
            <label for="email">Adresse e-mail</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Entrez votre adresse e-mail"
              autocomplete="email"
              required
            />
          </div>
          <div class="form-group">
            <label for="password">Mot de passe</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Entrez votre mot de passe"
              autocomplete="current-password"
              required
            />
          </div>
          <button type="submit">Se connecter</button>
          <a href="mot_de_passe_oublie.html" class="auth-lien-discret"
            >Mot de passe oublié ?</a
          >
          <p class="auth-lien-discret">
            Pas encore de compte ? <a href="inscription.html">Inscrivez-vous</a>
          </p>
        </form>
      </section>
    </main>
    <footer class="footer" role="contentinfo">
      <p>&copy; 2026 Pâtissons. Tous droits réservés.</p>
      <nav class="footer-nav" aria-label="Navigation secondaire">
        <a href="mentions_legales.html" aria-label="Voir les mentions légales"
          >Mentions légales</a
        >
        <a href="contact.html" aria-label="Nous contacter">Contact</a>
        <a
          href="accessibilite.html"
          aria-label="Voir la déclaration d'accessibilité"
          >Accessibilité</a
        >
      </nav>
    </footer>

    <script src="../assets/js/main.js"></script>
  </body>
</html>
