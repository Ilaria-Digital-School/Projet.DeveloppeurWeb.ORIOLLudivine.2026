<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Pâtissons</title>
    <meta name="description"
        content="Inscrivez-vous sur Pâtissons pour partager et découvrir les meilleures recettes de pâtisseries.">

    <!-- Polices Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,200;1,300&display=swap"
        rel="stylesheet">

    <!-- Lien vers le fichier CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <!-- Lien vers le fichier CSS du Chatbot -->
    <link rel="stylesheet" href="../assets/css/chatbot.css">
</head>

<body>
    <header class="header" role="banner">
        <a href="../index.html" aria-label="Retour à l'accueil">
            <img class="logo" src="../assets/images/patissons-logo.svg" alt="Logo Pâtissons">
        </a>
        <nav class="header-nav" aria-label="navigation principale">
            <a href="../index.html" aria-label="Revenir sur la page d'accueil">Accueil</a>
            <a href="recettes.html">Recettes</a>
            <a href="ajouter_recette.html" aria-label="Ajouter une nouvelle recette">Ajouter une recette</a>
            <a href="inscription.html" aria-current="page">Inscription</a>
        </nav>

    </header>
    <main>

        <!-- Fil d'Ariane -->
        <nav aria-label="Fil d'ariane">
            <ol>
                <li><a href="../index.html">Accueil</a></li>
                <li><a href="connexion.html">Connexion</a></li>
                <li aria-current="page">Inscription</li>
            </ol>
        </nav>
        <section class="connexion-section" aria-label="Formulaire d'inscription">
            <h1>Créer un compte</h1>
            <form class="connexion-form" action="#" method="post" novalidate>
                <div class="form-group">
                    <label for="username">Nom d'utilisateur</label>
                    <input type="text" id="username" name="username" placeholder="Choisissez un nom d'utilisateur"
                        autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="email">Adresse e-mail</label>
                    <input type="email" id="email" name="email" placeholder="Entrez votre adresse e-mail"
                        autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password" placeholder="Créez un mot de passe"
                        autocomplete="new-password" minlength="8" required>
                </div>
                <div class="form-group">
                    <label for="password-confirm">Confirmer le mot de passe</label>
                    <input type="password" id="password-confirm" name="password_confirm"
                        placeholder="Répétez votre mot de passe" autocomplete="new-password" required>
                </div>

                <button type="submit">S'inscrire</button>
                <p class="auth-lien-discret">Déjà un compte ? <a href="connexion.html">Connectez-vous</a></p>
            </form>
        </section>
    </main>
    <footer class="footer" role="contentinfo">
        <p>&copy; 2026 Pâtissons. Tous droits réservés.</p>
        <nav class="footer-nav" aria-label="Navigation secondaire">
            <a href="mentions-legales.html">Mentions légales</a>
            <a href="contact.html">Contact</a>
            <a href="accessibilite.html">Accessibilité</a>
        </nav>
    </footer>

    <!-- Lien vers le fichier JavaScript du Chatbot -->
    <script src="../assets/js/chatbot.js"></script>
</body>

</html>
