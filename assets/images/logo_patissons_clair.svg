<svg xmlns="http://www.w3.org/2000/svg" width="320" height="80" viewBox="0 0 320 80">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700;1,400&amp;display=swap');
    </style>
  </defs>

  <!-- Cercle fond chocolat -->
  <circle cx="40" cy="40" r="38" fill="#2C1A0E"/>

  <!-- Anneau ornemental 1 -->
  <circle cx="40" cy="40" r="33" fill="none" stroke="#B07A4A" stroke-width="0.7"/>

  <!-- Anneau ornemental 2 pointillé -->
  <circle cx="40" cy="40" r="28" fill="none" stroke="#C4A882" stroke-width="0.4" stroke-dasharray="1.8 2.2"/>

  <!-- Losange haut -->
  <polygon points="40,4 42.5,6.5 40,9 37.5,6.5" fill="#C4A882"/>
  <!-- Losange bas -->
  <polygon points="40,71 42.5,73.5 40,76 37.5,73.5" fill="#C4A882"/>
  <!-- Losange gauche -->
  <polygon points="4,40 6.5,37.5 9,40 6.5,42.5" fill="#C4A882"/>
  <!-- Losange droit -->
  <polygon points="71,40 73.5,37.5 76,40 73.5,42.5" fill="#C4A882"/>

  <!-- P Playfair Display Bold Italic -->
  <text
    x="40" y="40"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'Playfair Display', Georgia, serif"
    font-style="italic"
    font-weight="700"
    font-size="38"
    fill="#EDD9C0"
    dy="1">P</text>

  <!-- Séparateur vertical -->
  <line x1="92" y1="20" x2="92" y2="60" stroke="#E8DDD0" stroke-width="0.5"/>

  <!-- Nom Pâtissons -->
  <text
    x="104" y="34"
    text-anchor="start"
    font-family="'Playfair Display', Georgia, serif"
    font-style="italic"
    font-weight="400"
    font-size="24"
    fill="#2C1A0E">Pâtissons</text>

  <!-- Filet ornemental -->
  <line x1="104" y1="43" x2="310" y2="43" stroke="#E8DDD0" stroke-width="0.4"/>

  <!-- Tagline -->
  <text
    x="105" y="56"
    text-anchor="start"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="8"
    fill="#B07A4A"
    letter-spacing="1.8">RECETTES &amp; SAVOIR-FAIRE</text>

</svg>
