<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&amp;display=swap');
    </style>
  </defs>

  <!-- Cercle fond chocolat -->
  <circle cx="32" cy="32" r="30" fill="#2C1A0E"/>

  <!-- Anneau ornemental 1 -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#B07A4A" stroke-width="0.7"/>

  <!-- Anneau ornemental 2 pointillé -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#C4A882" stroke-width="0.4" stroke-dasharray="1.5 2"/>

  <!-- Losange haut -->
  <polygon points="32,4 34,6 32,8 30,6" fill="#C4A882"/>
  <!-- Losange bas -->
  <polygon points="32,56 34,58 32,60 30,58" fill="#C4A882"/>
  <!-- Losange gauche -->
  <polygon points="4,32 6,30 8,32 6,34" fill="#C4A882"/>
  <!-- Losange droit -->
  <polygon points="56,32 58,30 60,32 58,34" fill="#C4A882"/>

  <!-- P Playfair Display Bold Italic -->
  <text
    x="32" y="32"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'Playfair Display', Georgia, serif"
    font-style="italic"
    font-weight="700"
    font-size="30"
    fill="#EDD9C0"
    dy="1">P</text>

</svg>
