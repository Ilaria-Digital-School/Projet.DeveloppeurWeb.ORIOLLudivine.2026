<svg xmlns="http://www.w3.org/2000/svg" width="320" height="80" viewBox="0 0 320 80">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700;1,400&amp;display=swap');
    </style>
  </defs>

  <!-- Fond chocolat -->
  <rect x="0" y="0" width="320" height="80" rx="8" fill="#2C1A0E"/>

  <!-- Cercle contour clair -->
  <circle cx="40" cy="40" r="33" fill="none" stroke="#EDD9C0" stroke-width="0.7"/>

  <!-- Anneau ornemental pointillé -->
  <circle cx="40" cy="40" r="28" fill="none" stroke="#B07A4A" stroke-width="0.4" stroke-dasharray="1.8 2.2"/>

  <!-- Losange haut -->
  <polygon points="40,9 42.5,11.5 40,14 37.5,11.5" fill="#EDD9C0"/>
  <!-- Losange bas -->
  <polygon points="40,66 42.5,68.5 40,71 37.5,68.5" fill="#EDD9C0"/>
  <!-- Losange gauche -->
  <polygon points="9,40 11.5,37.5 14,40 11.5,42.5" fill="#EDD9C0"/>
  <!-- Losange droit -->
  <polygon points="66,40 68.5,37.5 71,40 68.5,42.5" fill="#EDD9C0"/>

  <!-- P Playfair Display Bold Italic -->
  <text
    x="40" y="40"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'Playfair Display', Georgia, serif"
    font-style="italic"
    font-weight="700"
    font-size="38"
    fill="#EDD9C0"
    dy="1">P</text>

  <!-- Séparateur vertical -->
  <line x1="92" y1="20" x2="92" y2="60" stroke="#5C3A1E" stroke-width="0.5"/>

  <!-- Nom Pâtissons -->
  <text
    x="104" y="34"
    text-anchor="start"
    font-family="'Playfair Display', Georgia, serif"
    font-style="italic"
    font-weight="400"
    font-size="24"
    fill="#EDD9C0">Pâtissons</text>

  <!-- Filet ornemental -->
  <line x1="104" y1="43" x2="310" y2="43" stroke="#5C3A1E" stroke-width="0.4"/>

  <!-- Tagline -->
  <text
    x="105" y="56"
    text-anchor="start"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="8"
    fill="#B07A4A"
    letter-spacing="1.8">RECETTES &amp; SAVOIR-FAIRE</text>

</svg>
